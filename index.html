<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconde Vie | Boutique Officielle</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2rem; }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        #products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img {
            max-width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .btn-whatsapp {
            display: inline-block;
            background-color: #25D366;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            width: 80%;
        }
    </style>
</head>
<body>

    <header>
        <h1>🛍️ Seconde Vie</h1>
        <p>La qualité à petit prix</p>
    </header>

    <div class="container">
        <div id="products-grid">
            </div>
    </div>

    <script>
        // Ton numéro de téléphone WhatsApp (avec l'indicatif)
        const numeroWhatsApp = "243895373383";

        // Récupération des produits depuis ta base de données MongoDB
        fetch('/api/products')
            .then(response => response.json())
            .then(products => {
                const grid = document.getElementById('products-grid');
                products.forEach(product => {
                    const messageWa = encodeURIComponent(`Bonjour, je suis intéressé par l'article : ${product.name} au prix de ${product.price}$`);
                    
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${product.imageUrl}" alt="${product.name}">
                            <h3>${product.name}</h3>
                            <p>${product.description}</p>
                            <div class="price">${product.price} $</div>
                            <a href="https://wa.me/${numeroWhatsApp}?text=${messageWa}" class="btn-whatsapp" target="_blank">
                                💬 Acheter sur WhatsApp
                            </a>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Erreur lors du chargement des produits:', error));
    </script>
</body>
</html>
