<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECONDE VIE - Boutique Officielle</title>
    <style>
        :root { --noir: #1a1a1a; --or: #D4AF37; --blanc: #ffffff; --gris: #f9f9f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); color: var(--noir); padding-top: 130px; }
        
        /* HEADER RESPONSIVE */
        header { background: var(--noir); color: var(--or); padding: 15px; text-align: center; border-bottom: 3px solid var(--or); position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; }
        .header-actions { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .header-btn { background: var(--or); color: var(--noir); padding: 10px 20px; border-radius: 20px; font-weight: bold; text-decoration: none; font-size: 0.9em; cursor: pointer; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* GRILLE DE PRODUITS ADAPTATIVE */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px; }
        @media (min-width: 600px) { .container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); padding: 25px; } }
        
        .carte { background: var(--blanc); border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .carte img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .prix { font-size: 1.2em; color: var(--or); font-weight: bold; margin: 10px 0; }
        .btn-ajout { background: var(--noir); color: var(--or); border: 2px solid var(--or); width: 100%; padding: 10px; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 5px; }
        
        /* PANIER MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 90%; max-width: 450px; border-radius: 12px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .stock-badge { font-size: 0.75em; font-weight: bold; padding: 5px; border-radius: 5px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size: 1.5em; letter-spacing: 1px;">SECONDE VIE</h2>
    <div class="header-actions">
        <a href="https://wa.me/243893818689" class="header-btn" target="_blank">💬 Service Client</a>
        <button class="header-btn" onclick="ouvrirPanier()">🛒 Panier (<span id="panier-count">0</span>)</button>
    </div>
</header>

<div class="container" id="boutique-liste"></div>

<div id="panier-modal" class="modal">
    <div class="modal-content">
        <h2 style="border-bottom: 2px solid var(--or); padding-bottom: 10px; margin-top:0;">Mon Panier</h2>
        <div id="panier-liste" style="max-height: 200px; overflow-y: auto;"></div>
        
        <hr style="margin: 15px 0;">
        <h4 style="margin: 5px 0;">Coordonnées de Livraison</h4>
        <input type="text" id="client-nom" placeholder="Nom Complet">
        <input type="tel" id="client-tel" placeholder="N° WhatsApp (+243...)">
        <textarea id="client-adresse" rows="2" placeholder="Adresse (Commune, Quartier...)"></textarea>
        
        <h4 style="margin: 15px 0 5px 0;">Mode de Paiement</h4>
        <select id="moyen-paiement">
            <option value="Orange Money">🟠 Orange Money</option>
            <option value="M-Pesa">🔴 M-Pesa</option>
            <option value="En espèces à la livraison">💵 En espèces à la livraison</option>
        </select>
        
        <button class="btn-ajout" onclick="envoyerCommande()" style="padding: 15px; font-size: 1.1em; margin-top: 15px;">🚀 VALIDER LA COMMANDE</button>
        <button onclick="fermerPanier()" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:15px; padding: 10px;">Annuler & Fermer</button>
    </div>
</div>

<script>
    let panier = [];

    async function chargerBoutique() {
        const res = await fetch('/api/produits');
        const produits = await res.json();
        
        document.getElementById('boutique-liste').innerHTML = produits.map(p => {
            let etatStock = p.stock === 'infini' || p.stock > 10 ? '<span class="stock-badge" style="background:#d4edda; color:#155724;">✅ En abondance</span>' : 
                            (p.stock > 0 ? `<span class="stock-badge" style="background:#fff3cd; color:#856404;">⚠️ ${p.stock} restants</span>` : 
                            '<span class="stock-badge" style="background:#f8d7da; color:#721c24;">❌ Épuisé</span>');
            
            return `
            <div class="carte">
                <img src="${p.image}" onerror="this.src='https://via.placeholder.com/400x300?text=Photo'">
                <div class="info">
                    ${etatStock}
                    <h3 style="margin: 5px 0; font-size: 1.1em;">${p.nom}</h3>
                    <div class="prix">${p.prix} ${p.devise}</div>
                    ${p.stock !== 0 && p.stock !== '0' ? `<button class="btn-ajout" onclick="ajouterAuPanier('${p.nom}', ${p.prix}, '${p.devise}')">AJOUTER</button>` : `<button class="btn-ajout" style="background:gray; border:none;">RUPTURE</button>`}
                </div>
            </div>`;
        }).join('');
    }

    function ajouterAuPanier(nom, prix, devise) {
        panier.push({nom, prix, devise});
        document.getElementById('panier-count').innerText = panier.length;
    }

    function ouvrirPanier() {
        document.getElementById('panier-modal').style.display = 'block';
        document.getElementById('panier-liste').innerHTML = panier.map(item => `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                <span>${item.nom}</span><b>${item.prix} ${item.devise}</b>
            </div>
        `).join('');
    }

    function fermerPanier() { document.getElementById('panier-modal').style.display = 'none'; }

    async function envoyerCommande() {
        const nom = document.getElementById('client-nom').value;
        const tel = document.getElementById('client-tel').value;
        const adresse = document.getElementById('client-adresse').value;
        const paiement = document.getElementById('moyen-paiement').value;

        if(!nom || !tel || !adresse) return alert("Remplissez vos coordonnées !");

        await fetch('/api/commandes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ client: { nom, telephone: tel, adresse }, articles: panier, paiement: paiement }) });

        alert("✅ Commande validée ! Le DG vous contactera sur WhatsApp.");
        panier = []; document.getElementById('panier-count').innerText = "0"; fermerPanier();
    }
    
    window.onload = chargerBoutique;
</script>
</body>
</html>
