<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG SECONDE VIE - Administration</title>
    <style>
        :root { --noir: #1a1a1a; --or: #D4AF37; --blanc: #ffffff; --gris: #2a2a2a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--noir); color: var(--blanc); display: flex; flex-direction: column; }
        .sidebar { background: #000; padding: 10px; border-bottom: 2px solid var(--or); display: flex; overflow-x: auto; white-space: nowrap; }
        .sidebar h2 { display: none; }
        .menu-item { padding: 10px 15px; cursor: pointer; border-radius: 8px; margin-right: 10px; border: 1px solid #333; font-size: 0.9em; }
        .menu-item:hover, .active { background: var(--or); color: var(--noir); font-weight: bold; }
        .main { padding: 15px; width: 100%; box-sizing: border-box; }
        .section { display: none; background: var(--gris); padding: 15px; border-radius: 10px; border: 1px solid #444; overflow-x: auto; }
        .active-sec { display: block; }
        .form-box { background: #111; padding: 15px; border-radius: 8px; border: 1px solid var(--or); margin-bottom: 20px; }
        input, select { background: #222; color: white; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-or { background: var(--or); color: var(--noir); border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 5px; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; min-width: 550px; }
        th { background: var(--or); color: var(--noir); padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { width: 260px; height: 100vh; position: fixed; flex-direction: column; border-right: 2px solid var(--or); border-bottom: none; }
            .sidebar h2 { display: block; color: var(--or); text-align: center; border-bottom: 2px solid var(--or); padding-bottom: 15px; }
            .menu-item { margin-bottom: 10px; margin-right: 0; }
            .main { margin-left: 300px; padding: 30px; width: calc(100% - 340px); }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Espace DG</h2>
    <div class="menu-item active" onclick="ouvrirSection('cmd-attente', this)">📋 Commandes</div>
    <div class="menu-item" onclick="ouvrirSection('cmd-historique', this)">📜 Historique</div>
    <div class="menu-item" onclick="ouvrirSection('stock', this)">📦 Stock</div>
    <div class="menu-item" onclick="ouvrirSection('fournisseurs', this)">🤝 Fournisseurs</div>
</div>

<div class="main">
    <div id="cmd-attente" class="section active-sec">
        <h2 style="color:var(--or)">À Valider</h2>
        <div id="validation-box" class="form-box" style="display:none; background:#222;">
            <h3 style="color:var(--or);">Facturation : <span id="val-client-nom"></span></h3>
            <input type="number" id="val-frais" placeholder="Frais de livraison (ex: 5$)">
            <input type="text" id="val-duree" placeholder="Durée estimée (ex: 24h)">
            <button class="btn-or" onclick="confirmerValidation()" style="background:#25D366; color:white;">Valider & WhatsApp</button>
            <button class="btn-or" onclick="document.getElementById('validation-box').style.display='none'" style="background:red; color:white;">Annuler</button>
        </div>
        <table>
            <thead><tr><th>Client</th><th>Articles</th><th>Action</th></tr></thead>
            <tbody id="corps-cmd-attente"></tbody>
        </table>
    </div>

    <div id="cmd-historique" class="section">
        <h2 style="color:var(--or)">Historique</h2>
        <table>
            <thead><tr><th>Client</th><th>Livraison</th><th>Statut</th></tr></thead>
            <tbody id="corps-cmd-histo"></tbody>
        </table>
    </div>

    <div id="stock" class="section">
        <h2 style="color:var(--or)">Gestion du Stock</h2>
        <div class="form-box">
            <h3 id="titre-form-stock">Ajouter un produit</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="nom" placeholder="Nom de l'article">
            <input type="number" id="prix" placeholder="Prix">
            <select id="devise"><option value="$">Dollar ($)</option><option value="FC">Franc Congolais (FC)</option></select>
            <input type="file" id="image" accept="image/*">
            <input type="text" id="stock-qte" placeholder="Quantité (ex: 10 ou 'infini')">
            <select id="fournisseur-select"></select>
            <button class="btn-or" id="btn-save" onclick="sauvegarderProduit()">Ajouter au Stock</button>
            <button id="btn-cancel-edit" onclick="resetFormStock()" style="display:none; background:none; border:none; color:red; width:100%; margin-top:10px; cursor:pointer;">Annuler la modification</button>
        </div>
        <table>
            <thead><tr><th>Img</th><th>Produit</th><th>Stock</th><th>Actions</th></tr></thead>
            <tbody id="corps-stock"></tbody>
        </table>
    </div>

    <div id="fournisseurs" class="section">
        <h2 style="color:var(--or)">Annuaire Fournisseurs</h2>
        <div class="form-box">
            <input type="text" id="fourn-nom" placeholder="Nom du Fournisseur">
            <input type="tel" id="fourn-tel" placeholder="Numéro WhatsApp">
            <button class="btn-or" onclick="ajouterFournisseur()">Enregistrer Fournisseur</button>
        </div>
        <table>
            <thead><tr><th>Nom</th><th>Contact</th><th>Action</th></tr></thead>
            <tbody id="corps-fournisseurs"></tbody>
        </table>
    </div>
</div>

<script>
    let commandeEnCours = null;
    let listeFournisseurs = [];
    let listeProduits = [];

    function ouvrirSection(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active-sec');
        el.classList.add('active');
    }

    async function chargerFournisseurs() {
        const res = await fetch('/api/fournisseurs');
        listeFournisseurs = await res.json();
        document.getElementById('corps-fournisseurs').innerHTML = listeFournisseurs.map(f => `<tr><td><b>${f.nom}</b></td><td>${f.telephone}</td><td><button onclick="supprimerFournisseur('${f.id}')" style="background:red;color:white;border:none;padding:5px;border-radius:3px;">X</button></td></tr>`).join('');
        document.getElementById('fournisseur-select').innerHTML = `<option value="">-- Choisir Fournisseur --</option>` + listeFournisseurs.map(f => `<option value="${f.id}">${f.nom}</option>`).join('');
    }

    async function chargerStock() {
        const res = await fetch('/api/produits');
        listeProduits = await res.json();
        document.getElementById('corps-stock').innerHTML = listeProduits.map(p => {
            let f = listeFournisseurs.find(fourn => fourn.id === p.fournisseurId);
            return `<tr>
                <td><img src="${p.image}" style="width:40px;height:40px;border-radius:5px;"></td>
                <td><b>${p.nom}</b><br>${p.prix}${p.devise}</td>
                <td>${p.stock}</td>
                <td>
                    <button onclick="editerProduit('${p.id}')" style="background:blue;color:white;border:none;padding:5px;border-radius:3px;">Modifier</button>
                    <button onclick="supprimerProduit('${p.id}')" style="background:red;color:white;border:none;padding:5px;border-radius:3px;">X</button>
                </td>
            </tr>`;
        }).join('');
    }

    function editerProduit(id) {
        const p = listeProduits.find(prod => prod.id === id);
        if(!p) return;
        document.getElementById('edit-id').value = p.id;
        document.getElementById('nom').value = p.nom;
        document.getElementById('prix').value = p.prix;
        document.getElementById('devise').value = p.devise;
        document.getElementById('stock-qte').value = p.stock;
        document.getElementById('fournisseur-select').value = p.fournisseurId;
        document.getElementById('titre-form-stock').innerText = "Modifier le produit";
        document.getElementById('btn-save').innerText = "Mettre à jour l'article";
        document.getElementById('btn-cancel-edit').style.display = 'block';
        window.scrollTo(0,0);
    }

    function resetFormStock() {
        document.getElementById('edit-id').value = '';
        document.getElementById('nom').value = '';
        document.getElementById('prix').value = '';
        document.getElementById('stock-qte').value = '';
        document.getElementById('titre-form-stock').innerText = "Ajouter un produit";
        document.getElementById('btn-save').innerText = "Ajouter au Stock";
        document.getElementById('btn-cancel-edit').style.display = 'none';
    }

    async function sauvegarderProduit() {
        const id = document.getElementById('edit-id').value;
        const formData = new FormData();
        formData.append('nom', document.getElementById('nom').value);
        formData.append('prix', document.getElementById('prix').value);
        formData.append('devise', document.getElementById('devise').value);
        formData.append('stock', document.getElementById('stock-qte').value);
        formData.append('fournisseurId', document.getElementById('fournisseur-select').value);
        const fileInput = document.getElementById('image');
        if (fileInput.files.length > 0) formData.append('image', fileInput.files[0]);

        const url = id ? `/api/produits/${id}` : '/api/produits';
        await fetch(url, { method: id ? 'PUT' : 'POST', body: formData });
        resetFormStock();
        chargerStock();
    }

    async function supprimerProduit(id) {
        if(confirm("Supprimer cet article ?")) { await fetch(`/api/produits/${id}`, { method: 'DELETE' }); chargerStock(); }
    }

  // Remplace toute la fonction chargerCommandes() dans ton fichier admin.html par celle-ci :

async function chargerCommandes() {
    try {
        const res = await fetch('/api/commandes');
        const data = await res.json();
        
        // 1. Les commandes en attente
        const attente = data.filter(c => c.statut === "En attente");
        document.getElementById('corps-cmd-attente').innerHTML = attente.length > 0 ? attente.map(c => `
            <tr>
                <td><b>${c.client.nom}</b><br>📞 ${c.client.telephone}<br><small>${c.client.adresse}</small></td>
                <td>${c.articles.map(a => a.nom).join(', ')}<br><b style="color:var(--or)">Total: ${c.articles.reduce((sum, a) => sum + parseFloat(a.prix), 0)} ${c.articles[0].devise}</b></td>
                <td><button onclick="preparerValidation('${c.id}', '${c.client.nom}', '${c.client.telephone}')" class="btn-or" style="padding:5px; font-size:0.8em;">Valider</button></td>
            </tr>
        `).join('') : '<tr><td colspan="3" style="text-align:center;">Aucune nouvelle commande</td></tr>';

        // 2. L'historique des commandes validées
        const validees = data.filter(c => c.statut === "Validée");
        document.getElementById('corps-cmd-histo').innerHTML = validees.length > 0 ? validees.map(c => `
            <tr>
                <td>${c.client.nom}</td>
                <td>Frais: ${c.fraisLivraison} | ${c.dureeLivraison}</td>
                <td style="color:#25D366;">✅ Validée</td>
            </tr>
        `).join('') : '<tr><td colspan="3" style="text-align:center;">Historique vide</td></tr>';
    } catch (e) {
        console.error("Erreur chargement commandes:", e);
    }
}

    function preparerValidation(id, nom, tel) {
        commandeEnCours = { id, nom, tel };
        document.getElementById('val-client-nom').innerText = nom;
        document.getElementById('validation-box').style.display = 'block';
    }

    async function confirmerValidation() {
        const frais = document.getElementById('val-frais').value;
        const duree = document.getElementById('val-duree').value;
        const msg = encodeURIComponent(`*FACTURE SECONDE VIE*\n\nBonjour ${commandeEnCours.nom},\nVotre commande a été validée ! ✅\n\nFrais de livraison : ${frais}\nDurée estimée : ${duree}\n\nMerci de votre confiance.\nLe DG (+243 895 373 383)`);
        window.open(`https://wa.me/${commandeEnCours.tel}?text=${msg}`);
        await fetch(`/api/commandes/${commandeEnCours.id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ fraisLivraison: frais, dureeLivraison: duree }) });
        document.getElementById('validation-box').style.display = 'none';
        chargerCommandes();
    }

    async function ajouterFournisseur() {
        const nom = document.getElementById('fourn-nom').value;
        const tel = document.getElementById('fourn-tel').value;
        await fetch('/api/fournisseurs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({nom, telephone: tel}) });
        document.getElementById('fourn-nom').value = ''; document.getElementById('fourn-tel').value = '';
        chargerFournisseurs();
    }

    async function supprimerFournisseur(id) {
        if(confirm("Supprimer ?")) { await fetch(`/api/fournisseurs/${id}`, { method: 'DELETE' }); chargerFournisseurs(); }
    }

    window.onload = async () => { await chargerFournisseurs(); chargerStock(); chargerCommandes(); };
</script>
</body>
</html>
