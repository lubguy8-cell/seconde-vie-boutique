<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG SECONDE VIE - Gestion Cloudinary</title>
    <style>
        :root { --noir: #1a1a1a; --or: #D4AF37; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); display: flex; }
        .sidebar { width: 260px; background: var(--noir); color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar h2 { color: var(--or); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .menu-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .menu-item:hover, .active { background: var(--or); color: var(--noir); font-weight: bold; }
        .main { margin-left: 300px; padding: 30px; width: 100%; }
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-publier { background:var(--noir); color:var(--or); padding:10px 20px; cursor:pointer; font-weight:bold; border:1px solid var(--or); border-radius:5px; transition: 0.3s; }
        .btn-publier:hover { background: var(--or); color: var(--noir); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        img.thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>DG SECONDE VIE</h2>
    <div class="menu-item active">📦 Boutique & Stocks</div>
</div>

<div class="main">
    <div class="section">
        <h1>Gestion des Articles (Cloudinary)</h1>
        <div style="background:#f9f9f9; padding:20px; border-radius:10px; margin-bottom:20px;">
            <input type="text" id="nom" placeholder="Nom de l'article">
            <input type="number" id="prix" placeholder="Prix ($)">
            <label style="font-size: 0.8em; margin-left: 10px;">Photo : </label>
            <input type="file" id="imgFile" accept="image/*">
            <input type="text" id="fours" placeholder="Fournisseur">
            <select id="stk">
                <option value="Stock Infini">Stock Infini</option>
                <option value="1 exemplaire">1 exemplaire</option>
                <option value="5 exemplaires">5 exemplaires</option>
            </select>
            <button class="btn-publier" id="btnPublier" onclick="ajouter()">PUBLIER SUR CLOUDINARY</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Aperçu</th>
                    <th>Produit</th>
                    <th>Prix</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="corps-art"></tbody>
        </table>
    </div>
</div>

<script>
    // 1. CHARGER LES PRODUITS DEPUIS L'API
    async function chargerArticles() {
        try {
            const res = await fetch('/api/produits');
            const data = await res.json();
            const corps = document.getElementById('corps-art');
            corps.innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.image}" class="thumb"></td>
                    <td>${p.nom}</td>
                    <td>${p.prix}$</td>
                    <td>${p.stock}</td>
                    <td><button onclick="supprimer('${p._id}')" style="color:red; cursor:pointer; border:none; background:none; font-weight:bold;">Supprimer</button></td>
                </tr>
            `).join('');
        } catch (err) { console.error("Erreur chargement:", err); }
    }

    // 2. FONCTION POUR PUBLIER (Utilisation de FormData pour Cloudinary)
    async function ajouter() {
        const fileInput = document.getElementById('imgFile');
        const file = fileInput.files[0];
        const btn = document.getElementById('btnPublier');
        
        if (!file) { alert("S'il vous plaît, sélectionnez une photo dans votre galerie !"); return; }

        // On change le texte du bouton pendant l'envoi
        btn.innerText = "ENVOI EN COURS...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('nom', document.getElementById('nom').value);
        formData.append('prix', document.getElementById('prix').value);
        formData.append('fournisseurId', document.getElementById('fours').value);
        formData.append('stock', document.getElementById('stk').value);
        formData.append('image', file); // Le fichier brut pour Multer/Cloudinary

        try {
            const res = await fetch('/api/produits', {
                method: 'POST',
                body: formData // On envoie le formData sans Header (le navigateur le gère)
            });

            if(res.ok) {
                alert("Article publié avec succès sur Cloudinary ! ✅");
                location.reload();
            } else {
                alert("Erreur de publication. Vérifiez vos clés Cloudinary.");
                btn.innerText = "PUBLIER SUR CLOUDINARY";
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Erreur:", error);
            alert("Erreur serveur.");
            btn.innerText = "PUBLIER SUR CLOUDINARY";
            btn.disabled = false;
        }
    }

    // 3. FONCTION SUPPRIMER
    async function supprimer(id) {
        if(confirm("Supprimer cet article définitivement ?")) {
            await fetch('/api/produits/' + id, { method: 'DELETE' });
            chargerArticles();
        }
    }

    window.onload = chargerArticles;
</script>
</body>
</html>
