<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG SECONDE VIE - Gestion</title>
    <style>
        :root { --noir: #1a1a1a; --or: #D4AF37; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gris); display: flex; }
        .sidebar { width: 260px; background: var(--noir); color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar h2 { color: var(--or); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .menu-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .menu-item:hover, .active { background: var(--or); color: var(--noir); font-weight: bold; }
        .main { margin-left: 300px; padding: 30px; width: 100%; }
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-publier { background:var(--noir); color:var(--or); padding:10px 20px; cursor:pointer; font-weight:bold; border:1px solid var(--or); border-radius:5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>DG SECONDE VIE</h2>
    <div class="menu-item active">📦 Boutique & Stocks</div>
</div>

<div class="main">
    <div class="section">
        <h1>Gestion des Articles</h1>
        <div style="background:#f9f9f9; padding:20px; border-radius:10px; margin-bottom:20px;">
            <input type="text" id="nom" placeholder="Nom de l'article">
            <input type="number" id="prix" placeholder="Prix ($)">
            <label style="font-size: 0.8em; margin-left: 10px;">Photo : </label>
            <input type="file" id="imgFile" accept="image/*">
            <input type="text" id="fours" placeholder="Fournisseur">
            <select id="stk">
                <option value="Stock Infini">Stock Infini</option>
                <option value="1 exemplaire">1 exemplaire</option>
                <option value="5 exemplaires">5 exemplaires</option>
            </select>
            <button class="btn-publier" onclick="ajouter()">PUBLIER</button>
        </div>
        
        <table>
            <thead><tr><th>Produit</th><th>Prix</th><th>Stock</th><th>Fournisseur</th><th>Action</th></tr></thead>
            <tbody id="corps-art"></tbody>
        </table>
    </div>
</div>

<script>
    // 1. CHARGER LES ARTICLES AU DÉMARRAGE
    async function chargerArticles() {
        try {
            const res = await fetch('/api/products');
            const data = await res.json();
            const corps = document.getElementById('corps-art');
            corps.innerHTML = data.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.price}$</td>
                    <td>${p.stock}</td>
                    <td>${p.fournisseur}</td>
                    <td><button onclick="supprimer('${p._id}')" style="color:red; cursor:pointer; border:none; background:none;">Supprimer</button></td>
                </tr>
            `).join('');
        } catch (err) { console.error("Erreur chargement:", err); }
    }

    // 2. FONCTION POUR PUBLIER (Galerie -> Base64 -> MongoDB)
    async function ajouter() {
        const file = document.getElementById('imgFile').files[0];
        if (!file) { alert("S'il vous plaît, choisissez une photo !"); return; }

        const reader = new FileReader();
        reader.onloadend = async function() {
            const article = {
                name: document.getElementById('nom').value,
                price: document.getElementById('prix').value,
                imageUrl: reader.result, // C'est ici que la photo part en texte
                fournisseur: document.getElementById('fours').value,
                stock: document.getElementById('stk').value,
                description: "Produit Seconde Vie"
            };

            const res = await fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(article)
            });

            if(res.ok) {
                alert("Article publié avec succès ! ✅");
                location.reload();
            } else {
                alert("Erreur de publication. Vérifiez la taille de l'image.");
            }
        };
        reader.readAsDataURL(file);
    }

    // 3. FONCTION SUPPRIMER
    async function supprimer(id) {
        if(confirm("Voulez-vous supprimer cet article ?")) {
            await fetch('/api/products/' + id, { method: 'DELETE' });
            chargerArticles();
        }
    }

    window.onload = chargerArticles;
</script>
</body>
</html>
