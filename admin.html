<div style="background:#f9f9f9; padding:20px; border-radius:10px; margin-bottom:20px;">
    <input type="text" id="nom" placeholder="Nom de l'article">
    <input type="number" id="prix" placeholder="Prix ($)">
    
    <label style="display:block; margin:10px 0; font-weight:bold;">📷 Photo de l'article :</label>
    <input type="file" id="fichier-image" accept="image/*">
    
    <input type="text" id="fours" placeholder="Fournisseur">
    <select id="stk">
        <option value="infini">Stock Infini</option>
        <option value="1">1 exemplaire</option>
        <option value="5">5 exemplaires</option>
    </select>
    <button onclick="ajouter()" style="background:var(--noir); color:var(--or); padding:10px 20px; cursor:pointer; font-weight:bold;">PUBLIER L'ARTICLE</button>
</div>

<script>
async function ajouter() {
    const inputImage = document.getElementById('fichier-image');
    if (inputImage.files.length === 0) return alert("Choisis une photo DG !");

    // On prépare les données pour l'envoi de fichier
    const formData = new FormData();
    formData.append('nom', document.getElementById('nom').value);
    formData.append('prix', document.getElementById('prix').value);
    formData.append('image', inputImage.files[0]); // Le fichier lui-même
    formData.append('fournisseur', document.getElementById('fours').value);
    formData.append('stock', document.getElementById('stk').value);

    const res = await fetch('/api/produits', {
        method: 'POST',
        body: formData // On envoie le FormData au lieu du JSON
    });

    if(res.ok) {
        alert("Article publié avec succès !");
        chargerArticles();
    }
}
// Garde le reste de tes fonctions (chargerArticles, chargerCommandes, etc.)
</script>
