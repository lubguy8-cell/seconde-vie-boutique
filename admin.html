<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - GL HUB</title>
    <style>
        body { font-family: sans-serif; background: #ecf0f1; padding: 20px; text-align: center; }
        .admin-panel { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #2980b9; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background: #3498db; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>Gestionnaire GL HUB</h2>
        <p>Ajouter un article depuis votre galerie</p>
        <input type="file" id="prodImage" accept="image/*">
        <input type="text" id="prodName" placeholder="Nom de l'article">
        <input type="number" id="prodPrice" placeholder="Prix en $">
        <textarea id="prodDesc" placeholder="Description courte..."></textarea>
        <button onclick="saveProduct()">PUBLIER SUR LA BOUTIQUE</button>
        <br><br>
        <a href="index.html">Voir la boutique</a>
    </div>

    <script>
        function saveProduct() {
            const file = document.getElementById('prodImage').files[0];
            const reader = new FileReader();

            reader.onloadend = async function() {
                const data = {
                    name: document.getElementById('prodName').value,
                    price: document.getElementById('prodPrice').value,
                    description: document.getElementById('prodDesc').value,
                    imageUrl: reader.result
                };

                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    alert("Article publié !");
                    window.location.href = "index.html";
                }
            };

            if (file) reader.readAsDataURL(file);
            else alert("Veuillez choisir une photo !");
        }
    </script>
</body>
</html>
